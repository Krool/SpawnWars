name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 20

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run build

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - uses: actions/deploy-pages@v4
        id: deployment

      - name: Discord deploy notification
        if: success()
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
          REPO: ${{ github.repository }}
          SHA: ${{ github.sha }}
          BEFORE: ${{ github.event.before }}
          AUTHOR: ${{ github.actor }}
          DEPLOY_URL: ${{ steps.deployment.outputs.page_url }}
        shell: bash
        run: |
          DESCFILE=$(mktemp)
          echo "**Recent changes:**" > "$DESCFILE"
          # Only show commits new in this push (between previous HEAD and current)
          if [ -n "$BEFORE" ] && git cat-file -t "$BEFORE" >/dev/null 2>&1; then
            RANGE="${BEFORE}..${SHA}"
          else
            RANGE="-1"
          fi
          git log --oneline --no-decorate $RANGE | while IFS= read -r line; do
            HASH=$(echo "$line" | cut -d' ' -f1)
            MSG=$(echo "$line" | cut -d' ' -f2-)
            echo "- [$HASH](https://github.com/$REPO/commit/$HASH) $MSG" >> "$DESCFILE"
          done
          PAYLOAD=$(jq -n \
            --rawfile desc "$DESCFILE" \
            --arg title "Spawn Wars Deployed" \
            --arg url "$DEPLOY_URL" \
            --arg footer "Deployed by $AUTHOR" \
            '{embeds: [{title: $title, description: ($desc | rtrimstr("\n")), url: $url, color: 5763719, footer: {text: $footer}}]}')
          curl -s -H "Content-Type: application/json" -d "$PAYLOAD" "$DISCORD_WEBHOOK"
